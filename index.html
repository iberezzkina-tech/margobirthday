<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лаборатория Регул-9 — Дневник аномальных образцов</title>
    <style>
        :root {
            --neon-purple: #b44dff; --neon-blue: #4dc9f6; --neon-cyan: #00e5ff;
            --dark-bg: #0a0a12; --panel-bg: rgba(16, 16, 30, 0.92); --golden: #ffd740;
            --error: #ff5252; --success: #69f0ae; --text: #e0e0f0; --text-dim: #9c9cc7;
            --font-mono: 'Courier New', 'Consolas', monospace;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            width:100vw; height:100vh; overflow:hidden;
            font-family:var(--font-mono); background:var(--dark-bg);
            user-select:none; -webkit-user-select:none;
            -webkit-tap-highlight-color:transparent; cursor:crosshair;
            font-size: 1.5rem;
        }
        #title-screen {
            position:fixed; inset:0; z-index:1000;
            background:radial-gradient(ellipse at center, #12102a 0%, #06060f 100%);
            display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2rem;
            transition:opacity 0.8s ease, visibility 0.8s ease;
        }
        #title-screen.hidden { opacity:0; visibility:hidden; pointer-events:none; }
        #title-screen .logo-icon { font-size:5rem; filter:drop-shadow(0 0 30px var(--neon-purple)); animation:float-icon 3s ease-in-out infinite; }
        @keyframes float-icon { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-18px);} }
        #title-screen h1 { font-size:clamp(1.4rem,3vw,2.2rem); color:var(--neon-cyan); text-align:center; text-shadow:0 0 20px rgba(0,229,255,0.7); letter-spacing:0.08em; line-height:1.4; }
        #title-screen h1 span { display:block; font-size:0.7em; color:var(--neon-purple); text-shadow:0 0 15px rgba(180,77,255,0.7); }
        #title-screen .btn-start { font-family:var(--font-mono); padding:1rem 2.5rem; background:transparent; color:var(--neon-cyan); border:2px solid var(--neon-cyan); border-radius:50px; cursor:pointer; letter-spacing:0.1em; text-transform:uppercase; transition:all 0.35s ease; box-shadow:0 0 20px rgba(0,229,255,0.25); }
        #title-screen .btn-start:hover { background:rgba(0,229,255,0.12); box-shadow:0 0 40px rgba(0,229,255,0.5); transform:scale(1.04); }
        .hint-about {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-top: -1rem;
            text-align: center;
        }
        .age-warning { border:1px solid var(--error); padding:0.2rem 0.8rem; border-radius:20px; text-shadow:0 0 10px rgba(179, 148, 148, 0.7); letter-spacing:0.1em; color: var(--text-dim); }
        #lab-scene { position:fixed; inset:0; background-image:url('lab-bg.png'); background-size:cover; background-position:center; background-repeat:no-repeat; z-index:1; background-color:#0a0c18; }
        #lab-scene::before { content:''; position:absolute; inset:0; background:linear-gradient(rgba(180,77,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(180,77,255,0.04) 1px, transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
        #margo { position:absolute; width:clamp(80px,10vw,128px); height:auto; z-index:10; transition:left 0.6s cubic-bezier(0.25,0.1,0.25,1), top 0.6s cubic-bezier(0.25,0.1,0.25,1); filter:drop-shadow(0 0 8px rgba(180,77,255,0.5)); pointer-events:auto; cursor:pointer; }
        #margo img { width:100%; height:auto; display:block; }
        #margo.walking img { animation: walk 0.4s ease-in-out infinite; }
        @keyframes walk { 0%,100%{transform:rotate(0deg) translateY(0);} 25%{transform:rotate(2deg) translateY(-4px);} 75%{transform:rotate(-2deg) translateY(-4px);} }
        #speech-bubble { position:absolute; z-index:20; pointer-events:none; background:var(--panel-bg); border:1px solid var(--neon-cyan); border-radius:12px; padding:0.5rem 0.8rem; max-width:200px; color:var(--text); white-space:normal; text-align:center; box-shadow:0 0 15px rgba(0,229,255,0.4); opacity:0; transition:opacity 0.25s ease; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%); }
        #speech-bubble.show { opacity:1; }
        .device { position:absolute; z-index:5; cursor:pointer; transition:filter 0.3s ease, transform 0.3s ease; display:flex; flex-direction:column; align-items:center; gap:4px; pointer-events:auto; }
        .device img { width:100%; height:auto; display:block; pointer-events:none; }
        .device .dev-label { color:var(--text-dim); text-align:center; text-shadow:0 0 6px rgba(0,0,0,0.8); background:rgba(0,0,0,0.55); padding:2px 8px; border-radius:10px; white-space:nowrap; font-size:0.9rem; }
        .device:hover { filter:drop-shadow(0 0 18px var(--neon-purple)) brightness(1.2); transform:translateY(-2px); z-index:12; }
        .device.highlight { filter:drop-shadow(0 0 25px var(--neon-cyan)) brightness(1.3); animation:pulse-glow 1s ease-in-out infinite; }
        @keyframes pulse-glow { 0%,100%{filter:drop-shadow(0 0 20px var(--neon-cyan)) brightness(1.2);} 50%{filter:drop-shadow(0 0 40px var(--neon-cyan)) brightness(1.5);} }
        #sample-table { cursor:pointer; z-index:6; }
        #sample-table .sample-img { position:absolute; top:-35%; left:50%; transform:translateX(-50%); object-fit:contain; filter:drop-shadow(0 0 10px rgba(255,215,64,0.6)); pointer-events:auto; cursor:help; transition: transform 0.3s ease, filter 0.3s ease; }
        #sample-table .sample-img:hover { transform: translateX(-50%) scale(1.15); filter: drop-shadow(0 0 18px rgba(255,215,64,0.9)); }
        #sample-table .sample-img.present { animation:bobble 2s ease-in-out infinite; }
        @keyframes bobble { 0%,100%{transform:translateX(-50%) translateY(0);} 50%{transform:translateX(-50%) translateY(-8px);} }
        .hint-arrow { position:absolute; font-size:2rem; color:var(--neon-cyan); pointer-events:none; z-index:15; animation:arrow-bounce 0.7s ease-in-out infinite; text-shadow:0 0 15px var(--neon-cyan); }
        @keyframes arrow-bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-16px);} }
        #modal-overlay { position:fixed; inset:0; z-index:500; background:rgba(0,0,0,0.75); display:flex; align-items:center; justify-content:center; opacity:0; visibility:hidden; transition:opacity 0.35s ease, visibility 0.35s ease; backdrop-filter:blur(3px); }
        #modal-overlay.active { opacity:1; visibility:visible; }
        #modal { background:var(--panel-bg); border:1px solid rgba(180,77,255,0.5); border-radius:18px; padding:2rem 2.2rem; max-width:520px; width:90%; color:var(--text); box-shadow:0 20px 60px rgba(0,0,0,0.7); text-align:center; position:relative; animation:modal-in 0.35s ease; max-height:85vh; overflow-y:auto; }
        @keyframes modal-in { from{transform:translateY(30px) scale(0.94); opacity:0;} to{transform:translateY(0) scale(1); opacity:1;} }
        #modal h2 { color:var(--neon-cyan); margin-bottom:0.6rem; font-size:1.95rem; }
        #modal .subtitle { color:var(--text-dim); margin-bottom:1.4rem; }
        #modal .mini-game-area { margin:1rem 0; min-height:80px; display:flex; flex-direction:column; align-items:center; gap:1rem; }
        #modal button { font-family:var(--font-mono); padding:0.7rem 1.6rem; margin:0.3rem; border-radius:30px; border:1.5px solid var(--neon-purple); background:transparent; color:var(--neon-purple); cursor:pointer; letter-spacing:0.05em; transition:all 0.25s ease; }
        #modal button:hover { background:rgba(180,77,255,0.15); box-shadow:0 0 20px rgba(180,77,255,0.4); }
        #modal button.primary { border-color:var(--neon-cyan); color:var(--neon-cyan); font-weight:bold; }
        #modal button.primary:hover { background:rgba(0,229,255,0.15); box-shadow:0 0 25px rgba(0,229,255,0.5); }
        #modal .feedback { min-height:1.2em; color:var(--error); }
        #modal .feedback.success { color:var(--success); }
        #modal .btn-close-modal { position:absolute; top:10px; right:18px; background:none; border:none; color:var(--text-dim); font-size:2.1rem; cursor:pointer; padding:4px 10px; border-radius:50%; transition:all 0.2s; }
        #modal .btn-close-modal:hover { color:#fff; background:rgba(255,255,255,0.08); }
        .email-list-item { text-align:left; padding:0.6rem 0.8rem; border-bottom:1px solid rgba(255,255,255,0.1); cursor:pointer; transition:background 0.2s; }
        .email-list-item:hover { background:rgba(0,229,255,0.08); }
        .email-list-item .sender { font-weight:bold; color:var(--neon-cyan); }
        .email-detail { text-align:left; }
        .keypad { display:grid; grid-template-columns: repeat(3, 1fr); gap:0.5rem; margin-top:1rem; }
        .keypad button { padding:0.8rem; font-size:1.8rem; }
        #next-day-btn, #bank-btn, #restart-btn { position:fixed; z-index:450; font-family:var(--font-mono); padding:0.7rem 1.8rem; background:var(--panel-bg); border:2px solid var(--neon-cyan); border-radius:30px; color:var(--neon-cyan); cursor:pointer; letter-spacing:0.05em; box-shadow:0 0 20px rgba(0,229,255,0.4); transition:all 0.3s ease; opacity:0; visibility:hidden; pointer-events:none; }
        #next-day-btn { bottom:20px; right:20px; } #bank-btn { bottom:90px; right:160px; } #restart-btn { bottom:20px; left:20px; }
        #next-day-btn.visible, #bank-btn.visible, #restart-btn.visible { opacity:1; visibility:visible; pointer-events:auto; }
        #next-day-btn:hover, #bank-btn:hover, #restart-btn:hover { background:rgba(0,229,255,0.15); box-shadow:0 0 35px rgba(0,229,255,0.7); }
        #btn-hint { position:fixed; top:15px; right:15px; z-index:200; width:45px; height:45px; border-radius:50%; background:var(--panel-bg); border:2px solid var(--neon-cyan); color:var(--neon-cyan); font-size:2.7rem; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 0 15px rgba(0,229,255,0.4); transition:all 0.3s ease; }
        #btn-hint:hover { background:rgba(0,229,255,0.15); box-shadow:0 0 30px rgba(0,229,255,0.8); transform:scale(1.1); }
    </style>
</head>
<body>
    <div id="title-screen">
        <div class="logo-icon">🧪</div>
        <h1>Лаборатория Регул-9<br><span>Журнал аномальных образцов</span></h1>
        <div class="age-warning">18+</div>
        <p class="hint-about">❔ Подсказка и правила — кнопка «?» в правом верхнем углу</p>
        <button class="btn-start" id="btn-start">Приступить к работе</button>
    </div>
    <div id="lab-scene" style="visibility: hidden;">
        <div id="margo"><img src="margo.png" alt="Марго" id="margo-img"><img id="margo-hat" src="" style="display:none; position:absolute; top:0; left:0; width:100%; height:auto; pointer-events:none; z-index:11;"><div id="speech-bubble"></div></div>
        <div class="device" id="dev-microscope" style="left:72%;top:5%;width:clamp(55px,7.7vw,99px);" data-device="microscope"><img src="microscope.png" alt="Микроскоп"><span class="dev-label">Микроскоп</span></div>
        <div class="device" id="dev-burner" style="left:67%;top:55%;width:clamp(45px,6vw,75px);" data-device="burner"><img src="burner.png" alt="Горелка"><span class="dev-label">Горелка</span></div>
        <div class="device" id="dev-cabinet" style="left:2%;top:0%;width:clamp(144px,23.04vw,288px);" data-device="cabinet"><img src="cabinet.png" alt="Шкаф"><span class="dev-label">Шкаф с реактивами</span></div>
        <div class="device" id="dev-fridge" style="left:85%;top:20%;width:clamp(92px,14.7vw,184px);" data-device="fridge"><img src="fridge.png" alt="Холодильник"><span class="dev-label">Холодильник</span></div>
        <div class="device" id="dev-computer" style="left:50%;top:5%;width:clamp(120px,17.6vw,210px);" data-device="computer"><img src="computer.png" alt="Компьютер"><span class="dev-label">Компьютер</span></div>
        <div class="device" id="sample-table" style="left:52%;top:62%;width:clamp(70px,10vw,130px);" data-device="table"><img src="table.png" alt="Стол"><span class="dev-label">Стол образцов</span><img class="sample-img" id="sample-day-img" src="day1.png" alt="Образец"></div>
        <div class="hint-arrow" id="hint-arrow" style="display:none;">▼</div>
    </div>
    <div id="modal-overlay"><div id="modal"><button class="btn-close-modal" id="btn-close-modal">✕</button><h2 id="modal-title"></h2><div class="subtitle" id="modal-subtitle"></div><div class="mini-game-area" id="mini-game-area"></div><div class="feedback" id="modal-feedback"></div></div></div>
    <div id="day-dialog"></div><div id="golden-overlay"></div><div id="confetti-container"></div>
    <button id="next-day-btn">▶ Следующий день</button><button id="bank-btn">🏦 Сходить в банк</button><button id="restart-btn">🔄 Начать заново</button><button id="btn-hint">?</button>
    <script>
        (function() {
            const birthdayName = "Марго"; const MOVE_THRESHOLD = 80;
            const daysConfig = [null,
                { num:1, title:'Осколок астероида', sampleImg:'day1.png', requiredDevice:'cabinet', miniGame:'reagents', deviceLabel:'Шкаф с реактивами', sender:'МОЛР', purpose:'Подтвердить подлинность.', story:'Образец доставлен в гермоконтейнере.', result:'Это осколок астероида.', quote:'День сурка', reviews:[{text:"Блестящая работа!",rating:'positive'},{text:"Анализ занял слишком много времени.",rating:'negative'}], review:null },
                { num:2, title:'Шерсть йети', sampleImg:'day2.png', requiredDevice:'microscope', miniGame:'focus', deviceLabel:'Микроскоп', sender:'Клуб Криптозоологов', purpose:'Подтвердить подлинность шерсти.', story:'Клочок шерсти найден в Гималаях.', result:'Уникальная чешуйчатая структура.', quote:'Хьюстон, у нас проблемы', reviews:[{text:"Потрясающе! Йети подтверждён.",rating:'positive'},{text:"Вы уверены, что это шерсть йети?",rating:'negative'}], review:null },
                { num:3, title:'Эктоплазма', sampleImg:'day3.png', requiredDevice:'burner', miniGame:'flame', deviceLabel:'Горелка', sender:'Охотники за привидениями', purpose:'Подтвердить эктоплазменную матрицу.', story:'Эктоплазма изловлена в старом особняке.', result:'Пламя окрасилось в зелёно-голубой.', quote:'Задача дня: окропить лабораторию святой водой', reviews:[{text:"Вы подтвердили эктоплазму!",rating:'positive'},{text:"Мы ожидали фиолетовый.",rating:'negative'}], review:null },
                { num:4, title:'Артефакт Бермуд', sampleImg:'day4.png', requiredDevice:'computer', miniGame:'clicker', deviceLabel:'Компьютер', sender:'Бермудский Треугольник Инкорпорейтед', purpose:'Идентифицировать артефакт.', story:'Артефакт поднят со дна океана.', result:'Фрагмент якоря с автографом Нептуна.', quote:'Здесь могла быть ваша реклама', reviews:[{text:"Фрагмент якоря с автографом Нептуна!",rating:'positive'},{text:"Автограф Нептуна? Вы шутите?",rating:'negative'}], review:null },
                { num:5, title:'Очень загадочный торт', sampleImg:'day5.png', requiredDevice:'table', miniGame:'birthday', deviceLabel:'Стол с образцами', sender:'Отдел праздничных аномалий', purpose:'Открыть в День Рождения.', story:'Торт обнаружен на пороге.', result:'Торт оказался именинным.', quote:'Очень умная цитата', reviews:[{text:"Торт удался! С Днём Рождения!",rating:'positive'}], review:null }
            ];
            const titleScreen = document.getElementById('title-screen'); const btnStart = document.getElementById('btn-start'); const labScene = document.getElementById('lab-scene');
            const margo = document.getElementById('margo'); const margoImg = document.getElementById('margo-img'); const margoHat = document.getElementById('margo-hat');
            const speechBubble = document.getElementById('speech-bubble'); const modalOverlay = document.getElementById('modal-overlay'); const modalTitle = document.getElementById('modal-title');
            const modalSubtitle = document.getElementById('modal-subtitle'); const miniGameArea = document.getElementById('mini-game-area'); const modalFeedback = document.getElementById('modal-feedback');
            const btnCloseModal = document.getElementById('btn-close-modal'); const dayDialog = document.getElementById('day-dialog'); const hintArrow = document.getElementById('hint-arrow');
            const sampleDayImg = document.getElementById('sample-day-img'); const goldenOverlay = document.getElementById('golden-overlay'); const confettiContainer = document.getElementById('confetti-container');
            const sampleTable = document.getElementById('sample-table'); const allDevices = document.querySelectorAll('.device');
            const nextDayBtn = document.getElementById('next-day-btn'); const bankBtn = document.getElementById('bank-btn'); const restartBtn = document.getElementById('restart-btn'); const btnHint = document.getElementById('btn-hint');

            let currentDay = 1, dayCompleted = false; const daysCompleted = {1:false,2:false,3:false,4:false,5:false};
            let balance = 0, accountBlocked = false, bankBlockKnown = false; let billsPaid = { electricity: false, water: false };
            let isModalOpen = false, isMargoMoving = false; let miniGameActive = false, modalClearTimer = null;
            let margoLeft = 6, margoTop = 76; let purchasedItems = { bumble: false, shirt: false, hat: false, ears: false };
            let currentMargoOutfit = 'default', currentHeadwear = null;
            let purchaseNotified = { bumble: false, shirt: false, hat: false, ears: false }; let birthdayCongratsNotified = false;
            let allEmails = [], emailsInitialized = false;

            const margoPhrases = ["Йога сейчас была бы в тему","Хочу вишнёвый сидр","Инсульт жопы","Где мой лабораторный халат?","Опять эти реактивы...","Наука не ждёт!","Может, чайку?","Спектрометр бы сюда...","Этот образец пахнет приключениями!","Где спирт?","Я охуеваю, значит я существую","Пу-пу-пу","Бариста, два литра бамбла мне, срочно"];
            function showMargoBubble(text) { const phrase = text || margoPhrases[Math.floor(Math.random()*margoPhrases.length)]; speechBubble.textContent=phrase; speechBubble.classList.add('show'); clearTimeout(speechBubble._hideTimeout); speechBubble._hideTimeout=setTimeout(()=>speechBubble.classList.remove('show'),2500); }
            function setMargoPosition(l,t){margoLeft=l;margoTop=t;margo.style.left=l+'%';margo.style.top=t+'%';} setMargoPosition(margoLeft,margoTop);
            function updateMargoAppearance(){ margoImg.src=currentMargoOutfit==='bumble'?'margowbumble.png':currentMargoOutfit==='shirt'?'margoshirt.png':currentMargoOutfit==='both'?'margowbs.png':'margo.png'; if(currentHeadwear==='hat'){margoHat.src='bhat.png';margoHat.style.display='block';margoHat.style.top='-18px';margoHat.style.left='15%';margoHat.style.width='56%';} else if(currentHeadwear==='ears'){margoHat.src='catears.png';margoHat.style.display='block';margoHat.style.top='-8px';margoHat.style.left='15%';margoHat.style.width='70%';} else{margoHat.style.display='none';} }
            function getElementCenter(el){const r=el.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};}
            function getDistance(e1,e2){const a=getElementCenter(e1),b=getElementCenter(e2);return Math.hypot(a.x-b.x,a.y-b.y);}
            function getDeviceById(id){return id==='table'?sampleTable:document.getElementById('dev-'+id);}
            function moveMargoToDevice(dev){return new Promise(resolve=>{if(isMargoMoving)return;isMargoMoving=true;margo.classList.add('walking');const p=(()=>{const sr=labScene.getBoundingClientRect(),c=getElementCenter(dev);const mw=margo.getBoundingClientRect().width,mh=margo.getBoundingClientRect().height;return{left:Math.max(0,Math.min(100,((c.x-sr.left)/sr.width)*100-(mw/sr.width)*50)),top:Math.max(0,Math.min(100,((c.y-sr.top)/sr.height)*100-(mh/sr.height)*50))};})();setMargoPosition(p.left,p.top);showMargoBubble();setTimeout(()=>{isMargoMoving=false;margo.classList.remove('walking');resolve();},650);});}
            function highlightDevice(id){allDevices.forEach(d=>d.classList.remove('highlight'));if(!id){hintArrow.style.display='none';return;}const dev=getDeviceById(id);if(dev){dev.classList.add('highlight');const dr=dev.getBoundingClientRect(),sr=labScene.getBoundingClientRect();hintArrow.style.left=(dr.left-sr.left+dr.width/2)+'px';hintArrow.style.top=(dr.top-sr.top-35)+'px';hintArrow.style.display='block';}}
            function showDayDialog(day){const cfg=daysConfig[day];if(!cfg)return;dayDialog.innerHTML=`День ${cfg.num}: ${cfg.title}. Требуется: ${cfg.deviceLabel}`;dayDialog.classList.add('active');clearTimeout(dayDialog._timeout);dayDialog._timeout=setTimeout(()=>dayDialog.classList.remove('active'),6000);}
            function updateSampleOnTable(day){const cfg=daysConfig[day];if(!cfg)return;sampleDayImg.src=cfg.sampleImg;sampleDayImg.style.width=day===5?'100px':'50px';sampleDayImg.style.height=day===5?'100px':'50px';sampleDayImg.classList.add('present');}
            function openModal(title,subtitle,html){if(isModalOpen)closeModal(true);if(modalClearTimer)clearTimeout(modalClearTimer);modalTitle.textContent=title;modalSubtitle.innerHTML=subtitle||'';miniGameArea.innerHTML=html||'';modalFeedback.textContent='';modalFeedback.className='feedback';modalOverlay.classList.add('active');isModalOpen=true;}
            function closeModal(){miniGameActive=false;modalOverlay.classList.remove('active');isModalOpen=false;modalClearTimer=setTimeout(()=>{miniGameArea.innerHTML='';modalFeedback.textContent='';},350);}
            btnCloseModal.addEventListener('click',closeModal);
            function updateNextDayButton(){nextDayBtn.classList.toggle('visible',dayCompleted&&currentDay<=5);nextDayBtn.textContent=currentDay===5?'🎉 Завершить':'▶ Следующий день';}
            function updateBankButton(){bankBtn.classList.toggle('visible',accountBlocked&&bankBlockKnown);}
            nextDayBtn.addEventListener('click',()=>{if(dayCompleted){if(currentDay<5){showLoadingScreen('Загрузка...',()=>advanceToDay(currentDay+1));}else if(currentDay===5){triggerFinale();}}else showQuickHint(`Анализ не завершён. Подойдите к ${daysConfig[currentDay].deviceLabel}.`);});

            function openComputerMenu(){let h='<p>Выберите действие:</p>';if(currentDay===4&&!dayCompleted)h+='<button id="btn-analyze" class="primary">⚡ Анализ</button>';h+='<button id="btn-email">📧 Почта</button><button id="btn-browser">🌐 Браузер</button><button id="btn-balance">💰 Счёт</button><button id="btn-shop">🛒 Магазин</button><button id="btn-wardrobe">👗 Гардероб</button>';openModal('💻 Компьютер','',h);if(currentDay===4&&!dayCompleted)document.getElementById('btn-analyze').addEventListener('click',()=>{closeModal();startMiniGame(4);});document.getElementById('btn-email').addEventListener('click',openEmail);document.getElementById('btn-browser').addEventListener('click',openBrowserHistory);document.getElementById('btn-balance').addEventListener('click',openBalance);document.getElementById('btn-shop').addEventListener('click',openShop);document.getElementById('btn-wardrobe').addEventListener('click',openWardrobe);}
            function openArchive(){let html='<h2>🧊 Холодильник образцов</h2><div style="background:rgba(0,0,0,0.3);border-radius:12px;padding:1rem;margin:1rem 0;min-height:120px;"><div style="display:flex;flex-wrap:wrap;gap:0.5rem;justify-content:center;">';let hasSamples=false;for(let i=1;i<=5;i++){if(daysCompleted[i]){hasSamples=true;html+=`<button class="primary archive-sample-btn" data-day="${i}" style="font-size:0.9rem;">День ${i}: ${daysConfig[i].title}</button>`;}}if(!hasSamples)html+='<p style="color:var(--text-dim);">Пока нет завершённых анализов.</p>';html+='</div><div id="archive-detail" style="text-align:left;padding:0.5rem;"></div></div>';openModal('🧊 Архив','',html);const detailDiv=document.getElementById('archive-detail');if(detailDiv){document.querySelectorAll('.archive-sample-btn').forEach(btn=>btn.addEventListener('click',function(){const day=parseInt(this.dataset.day),cfg=daysConfig[day];detailDiv.innerHTML=`<p><strong>📦 ${cfg.title}</strong></p><p><em>Отправитель:</em> ${cfg.sender}</p><p><em>История:</em> ${cfg.story}</p><p><em>Результат:</em> ${cfg.result}</p><p><em>Отзыв:</em> ${cfg.review||'Нет отзыва'}</p><button id="btn-back-archive" class="primary" style="margin-top:0.5rem;">← Назад</button>`;document.getElementById('btn-back-archive').addEventListener('click',()=>detailDiv.innerHTML='');}));}}

            function setupReagentsGame(day){openModal('Анализ: '+daysConfig[day].title,'Осколок не реагирует на обычные растворители. Выберите правильный реагент (HF).','<button class="reagent-btn" data-reagent="HF">⚠️ HF</button><button class="reagent-btn" data-reagent="H2O">💧 H₂O</button><button id="btn-restart-mini" style="margin-top:1rem;">🔄 Попробовать снова</button>');let attempts=0;const btns=miniGameArea.querySelectorAll('.reagent-btn');btns.forEach(b=>b.addEventListener('click',function(){if(!miniGameActive)return;if(this.dataset.reagent==='HF'){modalFeedback.textContent='✅ Реакция пошла!';modalFeedback.className='feedback success';btns.forEach(b=>b.disabled=true);handleAnalysisSuccess(day);}else{attempts++;modalFeedback.textContent=`❌ Нет реакции. Попытка ${attempts} из 5.`;modalFeedback.className='feedback';if(attempts>=5){modalFeedback.textContent='💡 Подсказка: нужна HF.';btns.forEach(b=>b.disabled=true);}}}));document.getElementById('btn-restart-mini').addEventListener('click',()=>{closeModal();startMiniGame(day);});}
            function setupFocusGame(day){openModal('Анализ: '+daysConfig[day].title,'Настройте фокусировку. Двигайте ползунок до 85-95%.',`<img class="blur-sample" id="blur-sample-img" src="${daysConfig[day].sampleImg}" style="filter:blur(18px);"><input type="range" id="focus-slider" min="0" max="100" value="30"><span id="focus-value">30%</span><button id="btn-restart-mini" style="margin-top:1rem;">🔄 Попробовать снова</button>`);let success=false;const slider=document.getElementById('focus-slider'),img=document.getElementById('blur-sample-img'),valSpan=document.getElementById('focus-value');slider.addEventListener('input',function(){if(!miniGameActive||success)return;const v=parseInt(this.value);valSpan.textContent=v+'%';img.style.filter=`blur(${Math.max(0,(100-v)*0.25)}px)`;if(v>=85&&v<=95){success=true;img.style.filter='blur(0px)';modalFeedback.textContent='🔬 Чётко!';modalFeedback.className='feedback success';slider.disabled=true;handleAnalysisSuccess(day);}});document.getElementById('btn-restart-mini').addEventListener('click',()=>{closeModal();startMiniGame(day);});}
            function setupFlameGame(day){openModal('Анализ: '+daysConfig[day].title,'Добавьте соли: сначала NaCl, потом CuSO₄.','<div class="flame-display" id="flame-display"></div><button class="salt-btn" data-salt="NaCl">🧂 NaCl</button><button class="salt-btn" data-salt="CuSO4">🔵 CuSO₄</button><button id="btn-restart-mini" style="margin-top:1rem;">🔄 Попробовать снова</button>');let step=0,success=false;const flame=document.getElementById('flame-display'),btns=miniGameArea.querySelectorAll('.salt-btn');btns.forEach(b=>b.addEventListener('click',function(){if(!miniGameActive||success)return;if(step===0&&this.dataset.salt==='NaCl'){step=1;flame.style.background='radial-gradient(circle, #ffdd00 10%, #ff8c00 50%, transparent 70%)';modalFeedback.textContent='🔥 Жёлто-оранжевое. Теперь CuSO₄.';modalFeedback.className='feedback success';this.disabled=true;}else if(step===1&&this.dataset.salt==='CuSO4'){success=true;flame.classList.add('green-blue');modalFeedback.textContent='✨ Зелёно-голубое!';modalFeedback.className='feedback success';btns.forEach(b=>b.disabled=true);handleAnalysisSuccess(day);}else{modalFeedback.textContent=step===0?'❌ Сначала NaCl.':'⚠️ Теперь CuSO₄.';modalFeedback.className='feedback';}}));document.getElementById('btn-restart-mini').addEventListener('click',()=>{closeModal();startMiniGame(day);});}
            function setupClickerGame(day){openModal('Анализ: '+daysConfig[day].title,'10 кликов за 5 секунд, чтобы стабилизировать поле.','<div class="click-counter" id="click-counter">0 / 10</div><div class="timer-bar"><div class="timer-bar-fill" id="timer-bar-fill" style="width:100%;"></div></div><p><span id="time-left">5.0</span> сек</p><button class="primary" id="btn-clicker">⚡ Удержать поле</button><button id="btn-restart-mini" style="margin-top:1rem;">🔄 Попробовать снова</button>');let clicks=0,target=10,limit=5,timer=null,ended=false;const counter=document.getElementById('click-counter'),bar=document.getElementById('timer-bar-fill'),timeSpan=document.getElementById('time-left'),btn=document.getElementById('btn-clicker');btn.addEventListener('click',()=>{if(!miniGameActive||ended)return;clicks++;counter.textContent=`${clicks} / ${target}`;if(clicks>=target&&!ended){ended=true;clearInterval(timer);btn.disabled=true;modalFeedback.textContent='🧲 Поле стабилизировано!';modalFeedback.className='feedback success';handleAnalysisSuccess(day);}});const start=Date.now();timer=setInterval(()=>{if(ended){clearInterval(timer);return;}const left=Math.max(0,limit-(Date.now()-start)/1000);bar.style.width=(left/limit)*100+'%';timeSpan.textContent=left.toFixed(1);if(left<=0&&!ended){ended=true;clearInterval(timer);btn.disabled=true;modalFeedback.textContent='⏰ Время вышло!';modalFeedback.className='feedback';}},100);document.getElementById('btn-restart-mini').addEventListener('click',()=>{closeModal();startMiniGame(day);});}

            labScene.addEventListener('click', async function(e) {
                if(isModalOpen||isMargoMoving||miniGameActive) return;
                if(e.target===margo||e.target.closest('#margo')) return;
                let deviceEl = e.target.closest('.device');
                if(deviceEl) {
                    const deviceId = deviceEl.dataset.device;
                    if(deviceId === 'computer') { await moveMargoToDevice(deviceEl); openComputerMenu(); return; }
                    if(deviceId === 'fridge') { await moveMargoToDevice(deviceEl); openArchive(); return; }
                    const cfg = daysConfig[currentDay];
                    const dist = getDistance(margo, deviceEl);
                    if(dist > MOVE_THRESHOLD) { await moveMargoToDevice(deviceEl); await new Promise(r=>setTimeout(r,500)); }
                    if(deviceId === 'table' && currentDay === 5 && !dayCompleted) { startMiniGame(5); return; }
                    if(cfg.requiredDevice === deviceId && !dayCompleted) { startMiniGame(currentDay); }
                    else { showQuickHint(`Нужен ${cfg.deviceLabel}.`); }
                } else {
                    const sr=labScene.getBoundingClientRect(); const cx=e.clientX-sr.left, cy=e.clientY-sr.top;
                    margo.classList.add('walking'); setMargoPosition(Math.max(0,Math.min(100,((cx-64)/sr.width)*100)), Math.max(0,Math.min(100,((cy-64)/sr.height)*100)));
                    showMargoBubble(); setTimeout(()=>{if(!isMargoMoving)margo.classList.remove('walking');},650);
                }
            });
            sampleDayImg.addEventListener('click', function(e) { e.stopPropagation(); if(isModalOpen||isMargoMoving||miniGameActive) return; if(currentDay===5&&!dayCompleted){startMiniGame(5);return;} if(currentDay===5&&daysCompleted[5]){openFinaleModal();return;} showSampleInfo(currentDay); });
            function showSampleInfo(day){openModal(`📋 Образец ${day}`,'',`<p>${daysConfig[day].title}</p>`);}
            btnHint.addEventListener('click', ()=> openModal('❔ О лаборатории','',`<div style="text-align:left; font-size:0.9rem; line-height:1.5;"><p><strong>Лаборатория Регул-9</strong> — ведущий независимый центр анализа аномальных образцов на Марсе. Основана и управляется доктором Марго, известным ксенобиологом.</p><p>Мы принимаем заказы со всей Солнечной системы: от корпораций, научных обществ и частных лиц. Безупречная репутация делает нас одной из самых прибыльных лабораторий Красной планеты.</p><p><strong>Как играть:</strong><br>• Кликайте по полу, чтобы Марго ходила.<br>• Нажмите на образец на столе — узнаете отправителя и цель.<br>• Нужный прибор подсвечен стрелкой. Подойдите и кликните — откроется мини-игра.<br>• После успешного анализа данные уходят заказчику, вы получите отзыв и оплату.<br>• Завершённые образцы хранятся в холодильнике (клик по нему открывает архив).<br>• Компьютер открывает доступ к почте, браузеру, банковскому счёту, интернет-магазину и гардеробу.<br>• Кнопка «Следующий день» в углу станет активной после завершения анализа.</p><p style="margin-top:1rem;">Связь с разработчиком возможна по электронной почте: i.berezzkina@gmail.com</p></div>`));
            btnStart.addEventListener('click', ()=>{ titleScreen.classList.add('hidden'); labScene.style.visibility='visible'; currentDay=1; dayCompleted=false; updateSampleOnTable(1); highlightDevice('cabinet'); showDayDialog(1); setMargoPosition(6,76); updateNextDayButton(); showMargoBubble(daysConfig[1].quote); restartBtn.classList.remove('visible'); updateMargoAppearance(); });
            console.log('🔬 Лаборатория Регул-9 готова.');
        })();
    </script>
